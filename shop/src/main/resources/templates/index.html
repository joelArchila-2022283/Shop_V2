<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio | Panel de Tienda</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloIndex.css}">
</head>
<body>

<div class="main-wrapper">
    <aside class="sidebar">
        <div class="profile-section">
            <div class="avatar-container">
                <img th:src="@{'/img/' + ${session.fotoPerfil}}" alt="Admin" class="avatar">
            </div>
            <h3 th:text="${session.usuarioLogueado}">Admin</h3>
            <p th:text="${session.rol}">Rol</p>
        </div>

        <nav class="menu">
            <a th:href="@{/index}" class="active">🏠 Dashboard</a>
            <a th:href="@{/usuarios}">👤 Usuarios</a>
            <a th:href="@{/clientes}">👥 Clientes</a>
            <a th:href="@{/productos}">🛍️ Productos</a>
            <a th:href="@{/ventas}">🛒 Ventas</a>
            <a th:href="@{/detalles}">📊 Detalle de Ventas</a>
            <hr>
            <a th:href="@{/logout}" class="logout">🚪 Cerrar Sesión</a>
        </nav>
    </aside>

    <main class="content">
        <header class="content-header">
            <h1>Panel Principal</h1>
            <p>Bienvenido al sistema de gestión, <span th:text="${session.usuarioLogueado}"></span>.</p>
        </header>

    </main>
</div>
</body>
</html>
