<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Venta - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloFormVenta.css}">
</head>
<body>

<main class="form-container">
    <div class="form-card">
        <h2 th:text="${venta.codigoVenta != null} ? 'Editar Venta' : 'Nueva Venta'">Nueva Venta</h2>

        <form th:action="@{/ventas/guardar}" th:object="${venta}" method="post">
            <input type="hidden" th:field="*{codigoVenta}">

            <div class="form-group">
                <label>Fecha de Venta:</label>
                <input type="date" th:field="*{fechaVenta}" required>
            </div>

            <div class="form-group">
                <label>Cliente:</label>
                <select th:field="*{cliente}" required>
                    <option value="" disabled selected>Seleccione un cliente</option>
                    <option th:each="c : ${clientes}"
                            th:value="${c.dpiCliente}"
                            th:text="${c.nombre}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Usuario (Vendedor):</label>
                <select th:field="*{usuario}" required>
                    <option value="" disabled selected>Seleccione el vendedor</option>
                    <option th:each="u : ${usuarios}"
                            th:value="${u.codigoUsuario}"
                            th:text="${u.nombreUsuario}"></option>
                </select>
            </div>

            <div class="form-group">
                <label>Estado:</label>
                <select th:field="*{estado}">
                    <option value="1">Activa</option>
                    <option value="0">Anulada</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Guardar Venta</button>
                <a th:href="@{/ventas}" class="btn-cancel">Cancelar</a>
            </div>
        </form>
    </div>
</main>

</body>
</html>
