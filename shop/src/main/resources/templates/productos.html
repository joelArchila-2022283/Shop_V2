<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloProductos.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong th:text="${session.usuarioLogueado}">Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>🛍️ Inventario de Productos</h1>
        <a th:href="@{/productos/nuevo}" class="btn-nuevo" style="text-decoration: none;">+ Nuevo Producto</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>Código</th>
                <th>Producto</th>
                <th>Precio</th>
                <th>Stock</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${listaProductos}">
                <td th:text="${p.codigoProducto}">ID</td>
                <td th:text="${p.nombreProducto}">Nombre del Producto</td>
                <td th:text="'Q ' + ${#numbers.formatDecimal(p.precio, 1, 2)}">Precio</td>
                <td>
                        <span th:class="${p.stock > 0} ? 'status-pill status-active' : 'status-pill status-inactive'"
                              th:text="${p.stock} + ' Unidades'">
                            0 Unidades
                        </span>
                </td>
                <td class="actions-cell">
                    <a th:href="@{/productos/editar/{id}(id=${p.codigoProducto})}" class="action-icon" style="text-decoration: none;">✏️</a>

                    <a th:href="@{/productos/eliminar/{id}(id=${p.codigoProducto})}"
                       class="action-icon"
                       style="text-decoration: none;"
                       onclick="return confirm('¿Estás seguro de que deseas eliminar este producto?')">
                        🗑️
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
