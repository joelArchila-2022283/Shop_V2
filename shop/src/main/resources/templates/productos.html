<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Productos - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloProductos.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>🛍️ Inventario de Productos</h1>
        <button class="btn-nuevo" type="button">+ Nuevo Producto</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>PROD-001</td>
                    <td>Cereal de Avena 500g</td>
                    <td>Abarrotes</td>
                    <td>Q 35.00</td>
                    <td><span class="status-pill status-active">45 Unidades</span></td>
                    <td class="actions-cell">
                        <span class="action-icon">✏️</span>
                        <span class="action-icon">🗑️</span>
                    </td>
                </tr>
                <tr>
                    <td>PROD-002</td>
                    <td>Leche Entera 1L</td>
                    <td>Lácteos</td>
                    <td>Q 12.50</td>
                    <td><span class="status-pill status-inactive">0 Unidades</span></td>
                    <td class="actions-cell">
                        <span class="action-icon">✏️</span>
                        <span class="action-icon">🗑️</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
