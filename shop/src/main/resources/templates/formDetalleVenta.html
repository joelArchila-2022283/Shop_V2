<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Venta</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloFormDetalleVentas.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">FORMULARIO</div>
    <a th:href="@{/detalles}" class="btn-back">← Volver al Historial</a>
</header>

<div class="page-wrapper">
    <div class="form-card">

        <!-- Encabezado -->
        <div class="form-header">
            <div class="form-icon">🧾</div>
            <h2 th:text="${detalle.id != null} ? 'Editar Detalle' : 'Agregar Producto a Venta'">Detalle</h2>
            <p class="form-subtitle">
                Factura <span class="factura-badge"
                              th:text="${idVenta != null} ? '#' + ${idVenta} : 'Sin asignar'"></span>
            </p>
        </div>

        <form th:action="@{/detalles/guardar}" th:object="${detalle}" method="post">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" name="ventaId" th:value="${idVenta}">

            <!-- Producto -->
            <div class="form-group">
                <label for="productoId">Producto</label>
                <select name="productoId" id="productoId" required>
                    <option value="" disabled>— Seleccione un producto —</option>
                    <option th:each="p : ${listaProductos}"
                            th:value="${p.codigoProducto}"
                            th:text="${p.nombreProducto} + '  |  Q ' + ${p.precio}"
                            th:selected="${detalle.producto != null and detalle.producto.codigoProducto == p.codigoProducto}">
                    </option>
                </select>
            </div>

            <!-- Cantidad y Precio -->
            <div class="form-row">
                <div class="form-group">
                    <label for="cantidad">Cantidad</label>
                    <input type="number" id="cantidad" th:field="*{cantidad}"
                           min="1" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label for="precio">Precio Unitario (Q)</label>
                    <input type="number" id="precio" th:field="*{precio}"
                           step="0.01" min="0" placeholder="0.00" required>
                </div>
            </div>

            <!-- Acciones -->
            <div class="form-actions">
                <a th:href="@{/detalles}" class="btn-cancel">Cancelar</a>
                <button type="submit" class="btn-submit"
                        th:text="${detalle.id != null} ? 'Actualizar Registro' : 'Guardar Registro'">
                    Guardar Registro
                </button>
            </div>
        </form>

    </div>
</div>

</body>
</html>
