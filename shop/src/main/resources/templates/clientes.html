<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Mi Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloClientes.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">Mi Panel</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>Listado de Clientes</h1>
        <a th:href="@{/clientes-gestion/nuevo}" class="btn-nuevo" style="text-decoration:none;">+ Nuevo Registro</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>DPI</th>
                    <th>Nombre Completo</th>
                    <th>Dirección</th>
                    <th>Estado</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${listaClientes}">
                <td th:text="${c.dpiCliente}">0000000</td>
                <td th:text="${c.nombreCliente} + ' ' + ${c.apellidoCliente}">Nombre Completo</td>
                <td th:text="${c.direccion}">Dirección</td>
                <td>
            <span th:text="${c.estado == 1 ? 'Activo' : 'Inactivo'}"
                  th:class="${c.estado == 1} ? 'status-pill status-active' : 'status-pill status-inactive'">
                Estado
            </span>
                </td>
                <td class="actions-cell">
                    <a th:href="@{/clientes-gestion/editar/{id}(id=${c.dpiCliente})}" class="action-icon" style="text-decoration:none;">✏️</a>
                    <a th:href="@{/clientes-gestion/eliminar/{id}(id=${c.dpiCliente})}"
                       class="action-icon" style="text-decoration:none;"
                       onclick="return confirm('¿Eliminar este cliente?')">🗑️</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
