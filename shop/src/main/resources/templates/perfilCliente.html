<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Tienda Click</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloperfilCliente.css}">
</head>
<body>
<div class="perfil-card">
    <header class="view-header">
        <h1>Mi Cuenta</h1>
        <span class="badge-rol" th:text="${session.rol}">ROL</span>
    </header>

    <div class="info-group">
        <label>Nombre de Usuario</label>
        <p th:text="${session.usuarioLogueado}">Usuario</p>
    </div>

    <div class="info-group">
        <label>Estado de Cuenta</label>
        <p>Activo</p>
    </div>

    <div style="margin-top: 30px;">
        <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;">
            Para cambios en tu información, contacta al administrador.
        </p>
        <a th:href="@{/index}"
           style="text-decoration: none; color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 25px; border-radius: 10px;">
            Volver al Panel
        </a>
    </div>
</div>
</body>
</html>
