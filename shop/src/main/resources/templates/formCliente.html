<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Formulario de Cliente</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloFormCliente.css}">
</head>
<body>

<div class="form-container">
    <h2 th:text="${titulo}">Gestión de Cliente</h2>
    <hr class="separator">

    <form th:action="@{/clientes-gestion/guardar}" th:object="${cliente}" method="post">
        <input type="hidden" th:field="*{dpiCliente}">

        <div class="form-group">
            <label>Nombre del Cliente</label>
            <input type="text" th:field="*{nombreCliente}" placeholder="Ej: Pedro Andres" required>
        </div>

        <div class="form-group">
            <label>Apellido del Cliente</label>
            <input type="text" th:field="*{apellidoCliente}" placeholder="Ej: Garza" required>
        </div>

        <div class="form-group">
            <label>Dirección de Residencia</label>
            <input type="text" th:field="*{direccion}" placeholder="Ej: Calle leal 21, Zona 2" required>
        </div>

        <div class="form-group">
            <label>Estado del Registro</label>
            <select th:field="*{estado}">
                <option value="1">Activo</option>
                <option value="0">Inactivo</option>
            </select>
        </div>

        <button type="submit" class="btn-save">Guardar Cliente</button>
        <a th:href="@{/clientes-gestion}" class="btn-cancel">Cancelar y volver</a>
    </form>
</div>

</body>
</html>
