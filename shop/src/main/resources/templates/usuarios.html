<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Usuarios - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloUsuarios.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong th:text="${session.usuarioLogueado}">Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>👤 Control de Usuarios</h1>
        <a th:href="@{/usuarios/nuevo}" class="btn-nuevo" style="text-decoration:none;">+ Nuevo Usuario</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Usuario</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Estado</th>
                <th style="text-align: center;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="u : ${listaUsuarios}">
                <td th:text="${u.codigoUsuario}">1</td>
                <td th:text="${u.username}">admin</td>
                <td th:text="${u.email}">correo@ejemplo.com</td>
                <td>
                        <span th:text="${u.rol}"
                              th:class="${u.rol == 'ADMIN'} ? 'role-badge badge-admin' : 'role-badge badge-user'">
                            Rol
                        </span>
                </td>
                <td>
                        <span th:text="${u.estado == 1 ? 'Activo' : 'Inactivo'}"
                              th:class="${u.estado == 1} ? 'status-pill status-active' : 'status-pill status-inactive'">
                            Estado
                        </span>
                </td>
                <td class="actions-cell">
                    <a th:href="@{/usuarios/editar/{id}(id=${u.codigoUsuario})}"
                       class="action-icon" style="text-decoration:none;">✏️</a>

                    <a th:href="@{/usuarios/eliminar/{id}(id=${u.codigoUsuario})}"
                       class="action-icon" style="text-decoration:none;"
                       onclick="return confirm('¿Estás seguro de que deseas eliminar este usuario?')">🗑️</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(listaUsuarios)}">
                <td colspan="6" style="text-align: center;">No hay usuarios registrados.</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
