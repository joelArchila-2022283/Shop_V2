<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Producto</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloProductos.css}">
</head>
<body>
<main class="container">
    <div class="view-header">
        <h1 th:text="${producto.codigoProducto != null} ? 'Editar Producto' : 'Nuevo Producto'">Formulario</h1>
    </div>

    <form th:action="@{/productos/guardar}" th:object="${producto}" method="post" class="table-container" style="padding: 30px;">
        <input type="hidden" th:field="*{codigoProducto}">

        <div style="margin-bottom: 20px;">
            <label style="display: block; margin-bottom: 8px;">Nombre del Producto:</label>
            <input type="text" th:field="*{nombreProducto}" required
                   style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
        </div>

        <div style="display: flex; gap: 20px; margin-bottom: 20px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px;">Precio (Q):</label>
                <input type="number" step="0.01" th:field="*{precio}" required
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 8px;">Stock inicial:</label>
                <input type="number" th:field="*{stock}" required
                       style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
            </div>
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 8px;">Estado:</label>
            <select th:field="*{estado}" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc;">
                <option value="1">Activo / Disponible</option>
                <option value="0">Inactivo / Descontinuado</option>
            </select>
        </div>

        <div style="text-align: right; gap: 10px; display: flex; justify-content: flex-end;">
            <a th:href="@{/productos}" class="btn-logout" style="text-decoration: none; background: #888;">Cancelar</a>
            <button type="submit" class="btn-nuevo">Guardar Producto</button>
        </div>
    </form>
</main>
</body>
</html>
