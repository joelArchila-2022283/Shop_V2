<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloVentas.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>🛒 Historial de Ventas</h1>
        <a th:href="@{/ventas/nuevo}" class="btn-nuevo">+ Nueva Venta</a>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>No. Factura</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Método Pago</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody>
            <tr th:each="v : ${listaVentas}">
                <td th:text="'#FAC-' + ${v.codigoVenta}">#FAC-000</td>
                <td th:text="${v.fechaVenta}">Fecha</td>
                <td th:text="${v.cliente != null ? v.cliente.nombreCliente : 'S/N'}">Cliente</td>
                <td class="total-amount" th:text="'Q ' + ${v.total}">Q 0.00</td>
                <td>Efectivo</td> <td class="actions-cell">
                <a th:href="@{/ventas/editar/{id}(id=${v.codigoVenta})}" class="action-icon">✏️</a>
                <a th:href="@{/ventas/eliminar/{id}(id=${v.codigoVenta})}"
                   class="action-icon"
                   onclick="return confirm('¿Eliminar esta venta?')">🗑️</a>
            </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
