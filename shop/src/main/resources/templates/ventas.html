<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ventas - MiSistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/estiloVentas.css}">
</head>
<body>

<header class="navbar">
    <div class="logo">MiSistema v1.0</div>
    <div class="user-info">
        <span>Bienvenido, <strong>Administrador</strong></span>
        <a th:href="@{/index}" class="btn-logout">Volver</a>
    </div>
</header>

<main class="container">
    <div class="view-header">
        <h1>🛒 Historial de Ventas</h1>
        <button class="btn-nuevo" type="button">+ Nueva Venta</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>No. Factura</th>
                    <th>Fecha</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Método Pago</th>
                    <th style="text-align: center;">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>#FAC-001</td>
                    <td>08/04/2026</td>
                    <td>Alberto Calderon</td>
                    <td class="total-amount">Q 150.00</td>
                    <td>Efectivo</td>
                    <td class="actions-cell">
                        <span class="action-icon">👁️</span>
                        <span class="action-icon">🗑️</span>
                    </td>
                </tr>
                <tr>
                    <td>#FAC-002</td>
                    <td>08/04/2026</td>
                    <td>María López</td>
                    <td class="total-amount">Q 1,200.50</td>
                    <td>Tarjeta</td>
                    <td class="actions-cell">
                        <span class="action-icon">👁️</span>
                        <span class="action-icon">🗑️</span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
